name: pnpm test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v5
      - name: setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: 25
          cache: 'pnpm'
      - name: install deps
        run: pnpm install --frozen-lockfile
      - name: run tests
        run: pnpm test
